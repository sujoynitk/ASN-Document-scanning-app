_schema-version: "3.1"
ID: asn-btp-app
version: 1.0.0
description: BTP Document Intelligence for ASN scanning

modules:

  - name: asn-btp-app-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
      memory: 128M          # ← add this
      disk-quota: 256M      # ← add this
    requires:
      - name: asn-hana-db

  - name: asn-btp-app-srv
    type: nodejs
    path: gen/srv
    parameters:
      memory: 192M          # already there
      disk-quota: 256M
    build-parameters:
      builder: npm
      ignore:
        - node_modules/
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: asn-hana-db
      - name: asn-xsuaa

  - name: asn-btp-app-approuter
    type: approuter.nodejs
    path: approuter
    parameters:
      memory: 512M          # already there
      disk-quota: 512M
    build-parameters:
      builder: npm
      npm-pack: false
      ignore:
        - ".npmrc"
    requires:
      - name: asn-xsuaa
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          url: ~{srv-url}
          forwardAuthToken: true

resources:

  # ── HANA HDI Container ────────────────────────────────────────────────────
  - name: asn-hana-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

  # ── XSUAA ────────────────────────────────────────────────────────────────
  - name: asn-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: asn-btp-app
        tenant-mode: dedicated